# Disable the blank line at the start of the prompt
add_newline = true
command_timeout = 3600

[username]
show_always = true
style_user = "#af5f5f"
style_root = "#af5f5f"
# format = '[$user ]($style)'
format = '[$user]($style)'
disabled = false

[os]
style = "#af5f5f"
disabled = true # Disabled by default

[directory]
style = "#dfaf87"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "¾░çİ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éİ"
style = "#af875f"
format = '[ $symbol $branch]($style)'

[git_status]
style = "#af875f"
format = '[$all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%R"
style = "#87875f"
format = '[ ´Çù $time ]($style)'
