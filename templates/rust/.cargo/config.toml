[profile.dev]
# Drop full DWARF for line-tables-only: backtraces still resolve to file:line,
# but the linker has dramatically less debuginfo to chew through on every
# relink — the dominant cost of the hot-loop edit cycle.
debug = "line-tables-only"
# Pair with line-tables-only on Linux: keeps debuginfo in separate .o files
# so the linker can skip reprocessing it when only code changed.
split-debuginfo = "unpacked"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
# threads=0 -> use all logical cores (nightly only).
# Cargo does not merge rustflags across tables or with the RUSTFLAGS env var,
# so every flag we want must live in this single array.
rustflags = ["-Z", "threads=0", "-C", "link-arg=-fuse-ld=mold"]
